name: Build and Release Firmware

on:
  push:
    paths:
      - 'VERSION'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if release exists
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
          exit 0

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y util-linux-extra xz-utils
          pip install cryptography

      - name: Download base firmwares
        if: steps.check.outputs.exists == 'false'
        run: gh release download v0.0.0-base -D .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build R2 firmware
        if: steps.check.outputs.exists == 'false'
        run: ./build_firmware.sh firmware_base.dav digicap_r2.dav

      - name: Build R0 firmware
        if: steps.check.outputs.exists == 'false'
        run: ./build_firmware.sh firmware_base_r0.dav digicap_r0.dav

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Firmware v${{ steps.version.outputs.version }}

          Two firmware files for different camera platforms:
          - **digicap_r2.dav** - IPC R2 (Hi3518E): DS-2CD2020F, DS-2CD2120F, DS-2CD2420F-IW, DS-2CD2x42, etc.
          - **digicap_r0.dav** - IPC R0 (Hi3516C): DS-2CD2032-I, DS-2CD2132-I, DS-2CD2332-I, DS-2CD2x32, etc.

          Flash via web UI (System > Firmware Upgrade) or curl:
          \`\`\`
          curl -u 'admin:PASSWORD' -X PUT http://CAMERA_IP/ISAPI/System/updateFirmware --data-binary @digicap_r2.dav
          \`\`\`" \
            digicap_r2.dav digicap_r0.dav
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
